<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>{% block title %}Sistema de reservas{% endblock %}</title>
    {% block extra_css %}
    {% endblock %}
</head>
<body>
    <header>
        {% block nav %}
        <nav id="nav-default">
        {{ (datos | default({})).nombre | default('') }}
        </nav>
        {% endblock %}
    </header>
    <main>
        {% block body %}{% endblock %}
    </main>
    <footer>
        <p>2026 {{ (datos | default({})).nombre | default('') }}</p>
    </footer>
</body>
</html>
